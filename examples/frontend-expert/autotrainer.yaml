schema_version: 1
project:
  name: polished-frontend-9b
  seed: 42
  artifact_dir: ./.autotrainer
model:
  provider: huggingface
  id: Qwen/Qwen3.5-9B
  revision: c202236235762e1c871ad0ccb60c8ee5ba337b9a
  cache_dir: ./.autotrainer/model-cache
  loader: qwen3_5_text
  trust_remote_code: false
  dtype: bfloat16
  max_sequence_length: 2048
  quantization:
    method: bitsandbytes-4bit
    quant_type: nf4
    double_quant: true
    compute_dtype: bfloat16
sources: []
qlora:
  rank: 32
  alpha: 32
  dropout: 0.0
  bias: none
  target_modules: all-linear
refinement:
  mode: adapter_only
  vram:
    max_gib: 20
    enforcement: hard
sft:
  enabled: true
  dataset: ./.autotrainer/compiled/sft/train.jsonl
  output_dir: ./.autotrainer/runs/sft
  max_length: 2048
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  num_train_epochs: 1
  bf16: true
  tf32: true
  gradient_checkpointing: true
  completion_only_loss: true
  assistant_only_loss: true
  packing: false
  seed: 42
  logging_steps: 5
  save_steps: 50
grpo:
  enabled: true
  algorithm: grpo
  dataset: ./.autotrainer/compiled/rl/train.jsonl
  sft_adapter: ./.autotrainer/runs/sft
  output_dir: ./.autotrainer/runs/grpo
  max_steps: 500
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  num_generations: 2
  calibration_generations: 4
  generation_batch_size: 2
  max_completion_length: 2048
  max_tool_calling_iterations: 8
  learning_rate: 1.0e-05
  beta: 0.0
  loss_type: dapo
  bf16: true
  tf32: true
  gradient_checkpointing: true
  use_vllm: false
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  seed: 42
environment:
  factory: autotrainer.environments.frontend:FrontendEnvironment
  backend: docker
  image: autotrainer/frontend-runtime:0.1
  network: none
  max_tool_output_chars: 20000
  episode_timeout_seconds: 900
evaluation:
  language: typescript_react
  task_pack: held-out-frontend
  dataset: ./.autotrainer/compiled/rl/evaluation.jsonl
  task_split: evaluation
  repetitions: 3
  seeds:
  - 1701
  - 1702
  - 1703
  holdout_unit: repository
  primary_metric: verified_task_success
  candidates:
  - reference_9b
  - autotrainer
  arms:
    reference_9b:
      label: Qwythos 9B reference
      role: reference
      parameter_class: 9b
      model:
        provider: huggingface
        id: empero-ai/Qwythos-9B-Claude-Mythos-5-1M
        revision: 14a29bae5143091aeaf87ad37120de4cd57d592c
        loader: auto_text_causal_lm
        trust_remote_code: false
        dtype: bfloat16
        max_sequence_length: 2048
        quantization: project
    autotrainer:
      label: AutoTrainer Qwen3.5 9B adapter
      role: candidate
      parameter_class: 9b
      model: project
      adapter:
        path: ./.autotrainer/runs/grpo
        stage: grpo
  suites:
    model_benchmark:
      kind: model_benchmark
      arms:
      - reference_9b
      - autotrainer
      runner:
        type: builtin
  fairness:
    paired_by:
    - task_id
    - repetition
    - seed
    same_task_snapshot: true
    same_instruction: true
    same_tools_and_limits: true
    same_verifier: true
    same_runner_within_suite: true
    same_sampling: true
    require_seed_control: true
    immutable_models_and_adapter: true
    pair_position_policy: deterministic_counterbalance
    execution_order_policy: frozen_per_suite
    per_trial_arm_randomization: false
    failures_score_zero: true
    allow_unplanned_reruns: false
  decisions:
    confidence: 0.95
    model_benchmark:
      candidate: autotrainer
      control: reference_9b
      metric: verified_task_success
      minimum_delta: 0.0
      minimum_tasks: 5
package:
  name: polished-frontend-9b
  type: lora_adapter
  winner: best
  output_dir: ./.autotrainer/packages/polished-frontend-9b
  merge_base_weights: false
  include:
  - adapter
  - system_prompt
  - tool_schema
  - evaluation_report
  - source_license_manifest
  - resolved_recipe
